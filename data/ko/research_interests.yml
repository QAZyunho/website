# 한국어 데이터. `title`은 슬러그와 언어 간 연결에 쓰이므로 영어(data/en)와 동일하게 유지하고,
# 산문(summary, details)만 번역하세요.
- title: Human-imitating AI
  summary: AI 시스템이 인간의 인지를 진정으로 반영하는 방식으로 추론하고, 소통하고, 행동하게 만들 수 있을까?
  details: |
    인간처럼 생각하고 상호작용하는 AI 시스템을 만드는 것에 관심이 있습니다.
    자연어 이해, 상식 추론, 제한된 인간 피드백으로부터 학습하는 문제를 탐구합니다.
    핵심 질문은 기계가 인간 사고의 결과물뿐 아니라, 그것을 만들어내는 과정 자체를
    습득할 수 있는가입니다.
- title: Machine Learning
  summary: 견고성과 샘플 효율성을 중심으로, 데이터로부터 일반화 가능한 표현을 학습하는 방법 연구.
  details: |
    머신러닝에서 모델이 훈련 분포를 넘어 일반화할 수 있는 방법에 집중합니다.
    이는 인간 수준의 적응력을 목표로 하는 AI 시스템의 필수 조건입니다.
    데이터 효율적 학습과 실제 성능을 더 잘 반영하는 평가 방법을 포함합니다.
