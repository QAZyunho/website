# Each entry becomes a page at /publications/<slugified-title>/ and a row on the
# publications list. Wrap YOUR name in **markdown bold** so it is highlighted in
# the author list. `type` must be one of: Conference, Workshop, Journal, Preprint.
# `selected: true` surfaces the entry on the home page. `interest` (optional) must
# match a title in data/research_interests.yml to cross-link the two pages.
# Omit any *Url field you don't have.
- title: "Learning Robust Representations from Limited Supervision"
  authors: "**Jane Doe**, John Smith, Alex Lee"
  venue: "NeurIPS"
  year: 2025
  type: "Conference"
  selected: true                       # shown in the home "Publications" list
  award: "Outstanding Paper Award"     # optional — renders a 🏆 badge
  interest: "Representation Learning"  # must match a research_interests.yml title
  paperUrl: "https://example.com/paper"
  codeUrl: "https://github.com/example/repo"
  dataUrl: "https://example.com/dataset"
  projectUrl: "https://example.com/project"
  abstract: "Placeholder abstract. Replace with your paper's abstract — it renders as the body of this publication's dedicated page."
