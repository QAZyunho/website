- title: Offline Reinforcement Learning
  summary: |
    I study how agents learn good sequential decision-making policies from fixed,
    previously collected data, without further interaction with the environment.
    I'm particularly interested in what shapes the quality of the policies learned
    this way.

- title: Human-like Reasoning in AI
  summary: |
    I'm broadly curious about how AI systems can be designed to reason in ways
    that reflect human cognition, beyond optimizing a single objective.
