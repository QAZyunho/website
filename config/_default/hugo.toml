# Structural site configuration. Owner-editable settings (identity, social links,
# palette, enabled sections) live in params.yaml so the /admin dashboard can edit
# them as YAML. Per-language param overrides stay here under [languages.<lang>.params].
baseURL = "https://2ood.github.io/hugo-academic-portfolio"
locale = "en"
title = "Your Name"
defaultContentLanguage = "en"

[taxonomies]
  tag = "tags"

[markup]
  [markup.highlight]
    style = "github"
    lineNos = false
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Languages. The default (defaultContentLanguage above) lives at /, others at /<lang>/.
[languages]
  [languages.en]
    label = "English"
    locale = "en"
    weight = 1
  [languages.ko]
    label = "한국어"
    locale = "ko"
    weight = 2
    [languages.ko.params]
      description = "박사과정 · Example University, 머신러닝 연구실"
      tagline = "표현 학습과 분포 외 일반화를 연구합니다."
