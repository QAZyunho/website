{{- /*
  Image render hook. Two jobs:
  1. Rewrite root-relative sources ("/images/uploads/abc.png") through relURL so
     they pick up the site's base path (…/your-repo/…), like render-link.html.
  2. When alt text is present, render the image as a captioned figure (alt → caption).
  Span-based (not <figure>) so the markup stays valid inside the <p> Goldmark wraps
  a standalone image in; .md-figure is set to display:block in SCSS.
*/ -}}
{{- $src := .Destination -}}
{{- if and (hasPrefix $src "/") (not (hasPrefix $src "//")) -}}
  {{- $src = $src | strings.TrimPrefix "/" | relURL -}}
{{- end -}}
{{- if .Text -}}
<span class="md-figure"><img src="{{ $src }}" alt="{{ .Text }}"{{ with .Title }} title="{{ . }}"{{ end }}><span class="md-figure__cap">{{ .Text }}</span></span>
{{- else -}}
<img src="{{ $src }}" alt=""{{ with .Title }} title="{{ . }}"{{ end }}>
{{- end -}}
