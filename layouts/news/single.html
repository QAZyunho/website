{{/*
  Full news page. Renders all entries from data/news.yml (newest first).
*/}}
{{ define "main" }}
<div class="news-page">
  <header class="page-header">
    <h1>{{ i18n "news" }}</h1>
  </header>
  <div class="news-list full-list">
    {{ range sort (index hugo.Data site.Language.Lang).news "date" "desc" }}
      {{ partial "news-entry.html" (dict "news" .) }}
    {{ end }}
  </div>
</div>
{{ end }}
