{{/* Custom 404. Builds to public/404.html, which GitHub Pages serves for unknown URLs. */}}
{{ define "main" }}
<section class="notfound">
  <p class="notfound-code">404</p>
  <h1 class="notfound-title">{{ i18n "notfound_title" }}</h1>
  <p class="notfound-text">{{ i18n "notfound_text" }}</p>
  <a class="btn btn--primary" href="{{ site.Home.RelPermalink }}">{{ i18n "back_home" }}</a>
</section>
{{ end }}
