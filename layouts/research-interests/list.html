{{/*
  Research Interests list. Each title links to its dedicated page.
*/}}
{{ define "main" }}
<div class="research-interests-page">
  <header class="page-header">
    <h1>{{ i18n "research_interests" }}</h1>
  </header>
  <div class="interests-detail-list">
    {{ range .Pages }}
    <a href="{{ .RelPermalink }}">
    <section class="interest-detail">
      <h2 class="interest-title">{{ .Title }}</h2>
      {{ with .Params.summary }}<p class="interest-summary">{{ . }}</p>{{ end }}
    </section>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
