baseURL = "https://username.github.io/your-repo/"
locale = "en"
title = "Your Name"

[taxonomies]
  tag = "tags"

[markup]
  [markup.highlight]
    style = "github"
    lineNos = false
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  description = "Ph.D. Candidate · Example University, Machine Learning Lab"
  tagline = "Researching representation learning and out-of-distribution generalization."
  faviconEmoji = "🌲"
  profileImage = "images/profile.svg"
  email = "you@example.com"
  googleScholar = "https://scholar.google.com/"
  github = "https://github.com/username"
  linkedin = "https://linkedin.com/in/username"
  cvPdf = "cv.pdf"
